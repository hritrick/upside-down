services:
  - type: web
    name: upside-down-backend
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install

    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Must be set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false # Must be set manually in Render dashboard
